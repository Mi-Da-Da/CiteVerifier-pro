<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>注册 - CiteVerifier</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", sans-serif; background: #f5f5f5; display: flex; flex-direction: column; min-height: 100vh; }

    nav {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 0 40px;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 24px;
    }
    nav a { text-decoration: none; color: #333; font-size: 15px; }
    nav a:hover { color: #4A90E2; }

    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 24px; margin-bottom: 28px; text-align: center; color: #222; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #4A90E2; }

    .btn {
      width: 100%;
      padding: 12px;
      background: #4A90E2;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { background: #357abd; }

    .tip { text-align: center; margin-top: 20px; font-size: 14px; color: #888; }
    .tip a { color: #4A90E2; text-decoration: none; }

    #msg { margin-top: 16px; text-align: center; font-size: 14px; }
    .success { color: #52c41a; }
    .error { color: #ff4d4f; }
  </style>
</head>
<body>

<nav>
  <a href="/">首页</a>
  <a href="#">英文文献</a>
  <a href="#">中文文献</a>
  <a href="#">更多</a>
</nav>

<div class="container">
  <div class="card">
    <h2>注册</h2>

    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" placeholder="3-20个字符">
    </div>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="email" placeholder="请输入邮箱">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="至少6位">
    </div>
    <div class="form-group">
      <label>确认密码</label>
      <input type="password" id="password2" placeholder="再次输入密码">
    </div>

    <button class="btn" onclick="register()">注册</button>
    <div id="msg"></div>

    <div class="tip">已有账号？<a href="/login">立即登录</a></div>
  </div>
</div>

<script>
async function register() {
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const password2 = document.getElementById('password2').value.trim();
  const msg = document.getElementById('msg');

  if (!username || !email || !password || !password2) {
    msg.className = 'error';
    msg.textContent = '请填写所有字段';
    return;
  }
  if (password !== password2) {
    msg.className = 'error';
    msg.textContent = '两次密码不一致';
    return;
  }

  const res = await fetch('/api/user/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, email, password })
  });
  const data = await res.json();

  if (data.success) {
    msg.className = 'success';
    msg.textContent = '注册成功，正在跳转到登录页...';
    setTimeout(() => window.location.href = '/login', 1500);
  } else {
    msg.className = 'error';
    msg.textContent = data.message;
  }
}
</script>

</body>
</html>
