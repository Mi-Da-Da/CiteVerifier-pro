<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>CiteVerifier - 文献验证系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", sans-serif; background: #f5f5f5; color: #333; }

    /* 导航栏 */
    nav {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .nav-left { display: flex; gap: 24px; align-items: center; }
    .nav-left a { text-decoration: none; color: #333; font-size: 15px; }
    .nav-left a:hover { color: #4A90E2; }
    .nav-right a {
      text-decoration: none;
      color: #fff;
      background: #4A90E2;
      padding: 8px 20px;
      border-radius: 4px;
      font-size: 14px;
    }
    .nav-right a:hover { background: #357abd; }

    /* 主内容 */
    .hero {
      text-align: center;
      padding: 80px 20px 40px;
    }
    .hero h1 { font-size: 36px; color: #222; margin-bottom: 12px; }
    .hero p { font-size: 16px; color: #666; margin-bottom: 40px; }

    .search-box {
      display: flex;
      max-width: 600px;
      margin: 0 auto 60px;
    }
    .search-box input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 4px 0 0 4px;
      font-size: 15px;
      outline: none;
    }
    .search-box button {
      padding: 12px 24px;
      background: #4A90E2;
      color: #fff;
      border: none;
      border-radius: 0 4px 4px 0;
      font-size: 15px;
      cursor: pointer;
    }
    .search-box button:hover { background: #357abd; }

    /* 亮点区域 */
    .features {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 0 40px 60px;
      flex-wrap: wrap;
    }
    .feature-card {
      background: #fff;
      border-radius: 8px;
      padding: 32px 28px;
      width: 260px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .feature-card .icon { font-size: 36px; margin-bottom: 16px; }
    .feature-card h3 { font-size: 18px; margin-bottom: 8px; }
    .feature-card p { font-size: 14px; color: #888; line-height: 1.6; }

    /* 应用场景 */
    .scenarios {
      background: #fff;
      padding: 40px;
      text-align: center;
    }
    .scenarios h2 { font-size: 24px; margin-bottom: 24px; }
    .scenario-list {
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }
    .scenario-item {
      background: #f0f4ff;
      border-radius: 8px;
      padding: 20px 28px;
      font-size: 15px;
      color: #4A90E2;
    }

    /* 搜索结果 */
    #result {
      max-width: 600px;
      margin: 0 auto 40px;
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: none;
    }
    #result h3 { margin-bottom: 12px; font-size: 16px; }
    #result table { width: 100%; border-collapse: collapse; font-size: 14px; }
    #result td { padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    #result td:first-child { color: #888; width: 120px; }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="/">首页</a>
    <a href="#">英文文献</a>
    <a href="#">中文文献</a>
    <a href="#">更多</a>
  </div>
  <div class="nav-right">
    <a href="/login">登录</a>
  </div>
</nav>

<div class="hero">
  <h1>CiteVerifier 文献验证系统</h1>
  <p>快速验证论文引用的真实性，防止 AI 幻觉文献</p>

  <div class="search-box">
    <input type="text" id="titleInput" placeholder="输入论文标题进行验证...">
    <button onclick="searchTitle()">验证</button>
  </div>
</div>

<div id="result">
  <h3>验证结果</h3>
  <table id="resultTable"></table>
</div>

<div class="features">
  <div class="feature-card">
    <div class="icon">🔍</div>
    <h3>本地 DBLP 匹配</h3>
    <p>基于本地数据库快速匹配，无需联网即可验证英文文献</p>
  </div>
  <div class="feature-card">
    <div class="icon">📄</div>
    <h3>批量验证</h3>
    <p>支持上传 PDF 或文献列表，一键批量验证所有引用</p>
  </div>
  <div class="feature-card">
    <div class="icon">🌐</div>
    <h3>中文文献支持</h3>
    <p>即将接入知网，全面覆盖中文学术文献验证</p>
  </div>
</div>

<div class="scenarios">
  <h2>应用场景</h2>
  <div class="scenario-list">
    <div class="scenario-item">📚 学位论文写作</div>
    <div class="scenario-item">📝 学术论文投稿</div>
    <div class="scenario-item">🤖 AI 生成内容核查</div>
    <div class="scenario-item">📖 文献综述整理</div>
  </div>
</div>

<script>
async function searchTitle() {
  const title = document.getElementById('titleInput').value.trim();
  if (!title) return alert('请输入论文标题');

  const res = await fetch('/api/search/title', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title })
  });
  const data = await res.json();

  const resultDiv = document.getElementById('result');
  const table = document.getElementById('resultTable');
  resultDiv.style.display = 'block';

  if (!data.found) {
    table.innerHTML = '<tr><td colspan="2">未找到匹配文献</td></tr>';
    return;
  }

  table.innerHTML = `
    <tr><td>查询标题</td><td>${data.query_title}</td></tr>
    <tr><td>匹配标题</td><td>${data.dblp_title}</td></tr>
    <tr><td>相似度</td><td>${(data.dblp_title_similarity * 100).toFixed(1)}%</td></tr>
    <tr><td>DBLP ID</td><td>${data.dblp_id}</td></tr>
    <tr><td>年份</td><td>${data.year || '-'}</td></tr>
    <tr><td>发表地点</td><td>${data.venue || '-'}</td></tr>
  `;
}
</script>

</body>
</html>
